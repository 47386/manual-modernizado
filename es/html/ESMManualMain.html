<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ESM - Maintenance and Repair Information System</title>
<script>
  var win = "";
  var win2 = "";
  var path = "";

function init() 
{
  var hashParam = {};
  var tmp = location.href.split("?");
  if(tmp.length > 1){
    var params = tmp[1].split("&");
    for(var i=0; i<params.length; i++){
      var pair = params[i].split("=");
      hashParam[pair[0]] = (pair.length > 1) ? decodeURIComponent(pair[1]) : "";
    }
  }
  path = tmp[0].substring(0,tmp[0].lastIndexOf("/")) + "/";
  var url = path + hashParam["url"];
  var baseFrame = document.getElementById('BASE');
  if(baseFrame) { baseFrame.src = url; }
}

function prSetTitle(pTitle) 
{
  top.document.title = pTitle;
}

function prClose()
{
  if(win != ""){
    try { win.close(); } catch(e) {}
  }
  if(win2 != ""){
    try { win2.close(); } catch(e) {}
  }
}

function getBase()
{
  return window.frames['BASE'];
}

function Old(obj)
{
  if(!obj || obj ==""){
    return;
  }
  else{
    if (obj.name !="BASE"){
      return;
    }
  }
  var title = obj.document.title;
  if(obj.document.title==""){title=document.title;}
  prSetTitle(title);
  return "";
}

function Tsl(key,sct,sc,sys,comp,sitq)
{
  return "";
}

function Cts(key,anc)
{
  if(!key){ key = ""; }
  if(!anc){ anc = ""; }
  if(key ==""){ return; }
  var str = (anc != "") ? "#" : "";

  if(win != ""){
    try { win.close(); } catch(e) {}
  }

  var url = path + key + ".html" + str + anc;
  var baseFrame = document.getElementById('BASE');
  if(baseFrame){ baseFrame.src = url; }
  return;
}

function Jmp(anc)
{
  if(!anc || anc ==""){ return; }
  var BASE = getBase();
  if(BASE){ BASE.location.hash = anc; }
  prClose();
}

function Prt(key,anc)
{
  if(!key || key ==""){ return; }
  if(!anc){ anc = ""; }
  var str = (anc != "") ? "#" : "";
  var w = 1024;
  var h = 668;
  var t = (screen.availHeight- h)/2;
  var l = (screen.availWidth - w)/2;
  h -= 28;
  win = window.open(path + key + ".html"+str+anc,"ESM_LOCAL_PRINT","top="+t+",left="+l+",width="+w+",height="+h+",menubar=no,status=yes,scrollbars=yes,resizable=yes");
  if(win){ win.resizeTo(w,h); win.moveTo(l,t); win.focus(); }
}

function Scl(sys,comp)
{
  if(!sys){ sys = ""; }
  if(!comp){ comp = ""; }
  var w = 800;
  var h = 600;
  var t = (screen.availHeight- h)/2;
  var l = (screen.availWidth - w)/2;
  var url = window.location.href.split("?");
  win2 = window.open(url[0] + "./EsmSysComponent.html?sys="+sys+"&comp="+comp,"ESM_LOCAL_SYSCOMP","top="+t+",left="+l+",width="+w+",height="+h+",menubar=no,status=no,scrollbars=no,resizable=yes");
  if(win2){ win2.resizeTo(w,h); win2.moveTo(l,t); win2.focus(); }
}

function prPrint()
{
  var BASE = getBase();
  if(BASE){
    if(typeof BASE.Apf === 'function'){
      BASE.Apf();
    }
    else {
      BASE.focus();
      BASE.print();
    }
  }
}

window.onload = function() { init(); };
window.onunload = function() { prClose(); };
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
#layout { display: flex; flex-direction: column; height: 100%; }
#menu-frame { height: 40px; flex-shrink: 0; overflow: hidden; }
#base-frame { flex: 1; overflow: hidden; }
iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>
<div id="layout">
  <div id="menu-frame">
    <iframe id="MENU" name="MENU" src="./ESMManualHead.html" scrolling="no" title="Menú"></iframe>
  </div>
  <div id="base-frame">
    <iframe id="BASE" name="BASE" src="about:blank" title="Contenido"></iframe>
  </div>
</div>
</body>
</html>
