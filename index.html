<script>
/* -----------------------------------------------------------------------
 * Global state — all initialised here so no iframe cross-origin access
 * is needed.
 * --------------------------------------------------------------------- */
/* Default language index — must match the position of 'es' in LANGINFO.JS
   (de=0, en=1, es=2, it=3, pt=4).  Kept as a named constant so it only
   needs to change in one place if LANGINFO.JS is ever reordered.        */
var DEFAULT_LANG_IDX = 2;

var gESM       = new Array;
var gLng       = new Array;
var gMSG       = new Array;
var gModelInfo = new Array;
var fn         = new Array;
var gSIE, gSmFlag, gBrmFlag, sDT;

gESM.Lng       = gLng;
gESM.lngSel    = DEFAULT_LANG_IDX;
gESM.MsgC      = gMSG;
gESM.ModelInfo = gModelInfo;
gESM.mySel     = 0;
gESM.mcSel     = 0;
gESM.subSel    = 0;
gESM.subUse    = 0;
gESM.mdlSel    = 0;
gESM.manTyp    = 'SM';
gESM.smFlag    = -1;
gESM.brmFlag   = -1;
gESM.Key       = "";
gESM.Sct       = "";
gESM.Sc        = "";
gESM.Sys       = "";
gESM.Comp      = "";
gESM.Sitq      = "";
gESM.Keyword   = "";
gESM.SIE       = new Array;
gSIE           = gESM.SIE;

fn.GetCookie  = GetCookie;
fn.SetCookie  = SetCookie;
fn.FormatStr  = FormatStr;
fn.ChangeLang = ChangeLang;
gESM.fn = fn;

/* Fill language list */
SetLang();

/* Fill model info */
CreateModelInf();
SetManualType();
gESM.smFlag  = gSmFlag;
gESM.brmFlag = gBrmFlag;

/* Restore selections from cookies */
(function () {
  var strLang = GetCookie("EsmLang");
  if (strLang.length > 0) {
    var code = strLang.substr(0, strLang.length - 1);
    for (var i = 0; i < gLng.length; i++) {
      if (code.toUpperCase() === gLng[i].Code.toUpperCase()) {
        gESM.lngSel = i;
        break;
      }
    }
  }

  var strYear = GetCookie("EsmYear");
  if (strYear.length > 0) {
    for (var i = 0; i < gModelInfo.length; i++) {
      if (strYear.toUpperCase() === gModelInfo[i].Year.toUpperCase()) {
        gESM.mySel = i;
        break;
      }
    }
  }

  var strCode = GetCookie("EsmCode");
  if (strCode.length > 0) {
    var list = gModelInfo[gESM.mySel].CodeList;
    for (var i = 0; i < list.length; i++) {
      if (strCode.toUpperCase() === list[i].Code.toUpperCase()) {
        gESM.mcSel = i;
        break;
      }
    }
  }

  var strType = GetCookie("EsmType");
  if (strType === "SM")      { gESM.mdlSel = 1; }
  else if (strType === "BM") { gESM.mdlSel = 2; }
}());

SetCookie("EsmStart", "true", true);
</script>

<!-- Override ChangeLang so it works without F10/F11 iframes -->
<script>
function ChangeLang(fSub) {
  var strLang = gESM.Lng[gESM.lngSel].Code;
  SetCookie("EsmLang", strLang + gESM.mySel);
  if (fSub) {
    /* Called after a language change by the user — reload the page so the
       correct language scripts (MODELINFO.JS etc.) are loaded again.      */
    window.location.reload();
  } else {
    /* Called on startup — just show the blank content page. */
    var f12 = document.getElementById('F12');
    if (f12) { f12.src = "./_COM/ESMBLANK.HTML"; }
  }
}
</script>

<!-- ===================================================================
     NAVIGATION JAVASCRIPT
     (Adapted from es/html/ESMSELCT.HTML — all parent.* references
      removed; paths adjusted to be relative to the root index.html)
     ================================================================ -->
<script>
/* Populate all dropdowns and set initial radio/iframe state. */
function Initialize() {
  var i, elmOpt;
  var cmbMY   = document.getElementById('cmbMY');
  var cmbMC   = document.getElementById('cmbMC');
  var cmbLang = document.getElementById('cmbLang');
  var radSM   = document.getElementById('radSM');
  var radBM   = document.getElementById('radBM');

  gMSG.length = 0;
  sDT = new Array;

  /* Year dropdown */
  for (i = 0; i < gModelInfo.length; i++) {
    elmOpt       = document.createElement("option");
    elmOpt.text  = gModelInfo[i].Year;
    elmOpt.value = i;
    cmbMY.options.add(elmOpt);
  }
  if (gESM.mySel < 0 || gESM.mySel >= gModelInfo.length) { gESM.mySel = 0; }
  cmbMY.selectedIndex = gESM.mySel;

  /* Model-code dropdown */
  var codeList = gModelInfo[cmbMY.selectedIndex].CodeList;
  for (i = 0; i < codeList.length; i++) {
    elmOpt       = document.createElement("option");
    elmOpt.text  = codeList[i].Code;
    elmOpt.value = i;
    cmbMC.options.add(elmOpt);
  }
  if (gESM.mcSel < 0 || gESM.mcSel >= codeList.length) { gESM.mcSel = 0; }
  cmbMC.selectedIndex = gESM.mcSel;

  /* Language dropdown */
  for (i = 0; i < gLng.length; i++) {
    elmOpt       = document.createElement("option");
    elmOpt.text  = gLng[i].Name;
    elmOpt.value = gLng[i].Code;
    cmbLang.options.add(elmOpt);
  }
  if (gESM.lngSel < 0 || gESM.lngSel >= gLng.length) { gESM.lngSel = DEFAULT_LANG_IDX; }
  cmbLang.selectedIndex  = gESM.lngSel;
  cmbLang.disabled       = (gLng.length <= 1);

  /* Radio buttons */
  radSM.disabled = (gESM.smFlag  === -1);
  radBM.disabled = (gESM.brmFlag === -1);
  radSM.checked  = false;
  radBM.checked  = false;

  if (gESM.mdlSel === 1) {
    radSM.checked = true;
  } else if (gESM.mdlSel === 2) {
    radBM.checked = true;
  } else {
    if (!radSM.disabled) {
      gESM.mdlSel   = 1;
      radSM.checked = true;
    } else if (!radBM.disabled) {
      gESM.mdlSel   = 2;
      radBM.checked = true;
    }
  }

  OnChangeIndv(true, gESM.mdlSel);
}

/* Load the component-tree iframe for the current selection. */
function loadTree() {
  var radSM  = document.getElementById('radSM');
  var radBM  = document.getElementById('radBM');
  var prefix;

  if      (radSM.checked) { prefix = "SMT_"; }
  else if (radBM.checked) { prefix = "BRT_"; }
  else {
    document.getElementById('iframeTree').src = "./_COM/ESMBLANK.HTML";
    return;
  }

  var strTree = prefix
    + gModelInfo[gESM.mySel].CodeList[gESM.mcSel].Code + "_"
    + gModelInfo[gESM.mySel].Year + ".html";

  document.getElementById('iframeTree').src =
    "./" + gLng[gESM.lngSel].Code + "/html/" + strTree;
}

/* ── Event handlers ─────────────────────────────────────────────── */

function OnChangeLang() {
  var cmbLang = document.getElementById('cmbLang');
  gESM.lngSel = cmbLang.selectedIndex;
  ChangeLang(true);   /* saves cookie and reloads the page */
}

function OnChangeText() {
  document.getElementById('F12').src = "./_COM/ESMBLANK.HTML";
}

function OnChangeModelYear() {
  var cmbMY = document.getElementById('cmbMY');
  var cmbMC = document.getElementById('cmbMC');
  var i, elmOpt;

  gESM.mySel = cmbMY.selectedIndex;
  ChangeModelYear(false);

  /* Rebuild model-code list */
  cmbMC.options.length = 0;
  var codeList = gModelInfo[cmbMY.selectedIndex].CodeList;
  for (i = 0; i < codeList.length; i++) {
    elmOpt       = document.createElement("option");
    elmOpt.text  = codeList[i].Code;
    elmOpt.value = i;
    cmbMC.options.add(elmOpt);
  }
  cmbMC.selectedIndex = 0;
  gESM.mcSel = 0;
  ChangeModelCode(false);

  document.getElementById('F12').src = "./_COM/ESMBLANK.HTML";
  loadTree();
}

function OnChangeModelCode() {
  var cmbMC = document.getElementById('cmbMC');
  gESM.mcSel = cmbMC.selectedIndex;
  ChangeModelCode(false);
  document.getElementById('F12').src = "./_COM/ESMBLANK.HTML";
  loadTree();
}

function OnChangeIndv(fReload, nIndex) {
  var radSM = document.getElementById('radSM');
  var radBM = document.getElementById('radBM');

  if (gESM.mdlSel === nIndex && !fReload) { return; }
  gESM.mdlSel = nIndex;

  if (nIndex === 1) {
    radSM.checked = true;
    radBM.checked = false;
    gESM.manTyp   = "SM";
  } else if (nIndex === 2) {
    radSM.checked = false;
    radBM.checked = true;
    gESM.manTyp   = "BM";
  }

  document.getElementById('F12').src = "./_COM/ESMBLANK.HTML";
  ChangeModelType(false);
  loadTree();
}

/* ── Search ─────────────────────────────────────────────────────── */

function WordSearch() {
  var radSM = document.getElementById('radSM');
  var radBM = document.getElementById('radBM');
  var prefix;

  gESM.Keyword = document.getElementById('txtWord').value;

  if      (radSM.checked) { prefix = "SML_"; }
  else if (radBM.checked) { prefix = "BRL_"; }
  else {
    document.getElementById('iframeTree').src = "./_COM/ESMBLANK.HTML";
    return;
  }

  var strTree = prefix
    + gModelInfo[gESM.mySel].CodeList[gESM.mcSel].Code + "_"
    + gModelInfo[gESM.mySel].Year + ".html";

  document.getElementById('F12').src =
    "./" + gLng[gESM.lngSel].Code + "/html/" + strTree;
}

function ClearSearch() {
  gESM.Key     = "";
  gESM.Sct     = "";
  gESM.Sc      = "";
  gESM.Sys     = "";
  gESM.Comp    = "";
  gESM.Sitq    = "";
  gESM.Keyword = "";
  document.getElementById('txtWord').value = "";
  document.getElementById('F12').src = "./_COM/ESMBLANK.HTML";
  loadTree();
}

/* ── Callbacks invoked by SelTree iframe (parent.Old / parent.Tsl) ─ */

window.addEventListener('message', function (event) {
  var data = event.data;
  if (!data || typeof data !== "object" || !data.type) { return; }

  if (data.type === "old") {
    Old({ name: document.getElementById('iframeTree').name });
  } else if (data.type === "tsl") {
    Tsl(data.key || "", data.sct || "", data.sc || "", data.sys || "", data.comp || "", data.sitq || "");
  } else if (data.type === "cts") {
    Cts(data.key || "", data.anc || "");
  } else if (data.type === "navigate") {
    if (data.url) { document.getElementById('F12').src = data.url; }
  }
});

/* Called by the SelTree iframe body.onLoad.  Hides the "Buscando..."
   spinner and shows the rendered tree.  The name check guards against
   spurious calls from other iframes (e.g. F12) that also call Old(). */
function Old(obj) {
  if (obj == null) { return; }
  if (obj.name === document.getElementById('iframeTree').name) {
    document.getElementById('divSysCompTreeSearching').style.display = "none";
    document.getElementById('divSysCompTreeSearched').style.display  = "block";
    gESM.Key     = "";
    gESM.Sct     = "";
    gESM.Sc      = "";
    gESM.Sys     = "";
    gESM.Comp    = "";
    gESM.Sitq    = "";
    gESM.Keyword = "";
  }
}

function Tsl(key, sct, sc, sys, comp, sitq) {
  gESM.Key  = key;
  gESM.Sct  = sct;
  gESM.Sc   = sc;
  gESM.Sys  = sys;
  gESM.Comp = comp;
  gESM.Sitq = sitq;
  document.getElementById('F12').src = "./_COM/ESMBLANK.HTML";
}

/* ── Callbacks invoked by F12 content pages (parent.Cts / parent.Prt etc.) ─ */

/* Cts: navigate F12 to a content page identified by its key. */

function Cts(key, anc) {
  var strLang = gESM.Lng[gESM.lngSel].Code;
  var url = "./" + strLang + "/html/" + key + ".html";
  if (anc) { url += "#" + anc; }
  document.getElementById('F12').src = url;
}

/* Jmp/Prt/Scl: stubs required by content pages that call parent.Jmp(),
   parent.Prt(), parent.Scl().  They are no-ops in the modernised single-
   page architecture but must exist to prevent JS errors. */
function Jmp(anc) {}
function Prt(key) {}
function Scl(sys, comp) {}

/* ── Startup ─────────────────────────────────────────────────────── */
window.onload = function () { Initialize(); };
</script>
